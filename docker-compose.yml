version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: euro-cyber-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-euro_cyber_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - euro-cyber-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: euro-cyber-app
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-euro_cyber_db}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - SBERT_MODEL=${SBERT_MODEL:-paraphrase-multilingual-MiniLM-L12-v2}
    volumes:
      - ./data:/app/data
      - ./src:/app/src
      - ./webapp:/app/webapp
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - euro-cyber-network
    command: tail -f /dev/null

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: euro-cyber-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@local.dev}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - euro-cyber-network

networks:
  euro-cyber-network:
    driver: bridge

volumes:
  postgres_data:
  pgadmin_data:
